name: Deploy to SiteGround

# Deploys the myfeeds-affiliate-feed-manager plugin folder to the live
# WordPress install on SiteGround after every push to main. A manual run
# is also exposed via workflow_dispatch so you can redeploy without a
# new commit.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_HOST          e.g. ssh.mylook.com.de
#   SSH_USER          your SiteGround SSH username (Site Tools → SSH Keys Manager)
#   SSH_PORT          usually 18765 for SiteGround; defaults to 22 if unset
#   SSH_PRIVATE_KEY   the private half of the SSH key whose public half is
#                     added in Site Tools → SSH Keys Manager
#   SSH_PASSPHRASE    the passphrase you set when generating the key in
#                     SiteGround; leave unset if the key has no passphrase
#   WP_PLUGINS_DIR    absolute path to wp-content/plugins on the server,
#                     e.g. /home/customer/www/shop.mylook.com.de/public_html/wp-content/plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-siteground
  cancel-in-progress: false

jobs:
  deploy:
    name: rsync plugin folder
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start ssh-agent with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          ssh-auth-sock: /tmp/ssh-auth.sock
          # webfactory/ssh-agent reads the passphrase from this env var
          # when the key is encrypted; harmless to pass when empty.
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}

      - name: Pin SiteGround host key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: rsync plugin to SiteGround
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          WP_PLUGINS_DIR: ${{ secrets.WP_PLUGINS_DIR }}
        run: |
          PORT="${SSH_PORT:-22}"
          TARGET="${WP_PLUGINS_DIR%/}/myfeeds-affiliate-feed-manager/"
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='tests/' \
            --exclude='.vibe-context/' \
            -e "ssh -p $PORT -o StrictHostKeyChecking=yes" \
            ./myfeeds-affiliate-feed-manager/ \
            "${SSH_USER}@${SSH_HOST}:${TARGET}"
